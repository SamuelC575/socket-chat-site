<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPV Connect</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="theme-beach animated-gradient">
    <div id="message-container"></div>
    <form id="form">
        <div class="chat-input">
            <input type="text" placeholder="1-10" id="lobby-input">
            <input type="text" id="message-input" placeholder="Message">
            <button type="button" id="send-button" class="green">Send</button>
        </div>

        <div class="user-input">
            <button type="button" id="lobby-button" class="blue">Lobby</button>
            <input type="text" id="user-input" placeholder="Username">
            <button type="button" id="user-button" class="red">Change</button>
        </div>
    </form>

    <a href="./about/about.html" class="button blue">i</a>
    <a href="./report/report.html" class="button red" id="report">!</a>
    <a href="./updatelog/update.html" class="button black" id="update">>_</a>
    <a href="./question/question.html" class="button pink" id="question">?</a>
    <a href="./games/games.html" class="button red" id="games">▶</a>

    <div class="no-hover-button blue right" id="lobby-number">...</div>
    
    <button type="button" id="list-open" class="black-green button">ツ</button>
    <div id="user-list" class="black-green">_</div>

    <button type="button" id="settings-open" class="black-green button">⛭</button>
    <div id="settings-panel" class="black">
        <div id="theme">Settings Beta*</div>
        <div class="theme-option theme-beach" data-theme="theme-classic">
            Beach
            <button type="button" id="beach-change" class="animated-gradient theme-beach">Change</button>
        </div>
        <div class="theme-option theme-dark" data-theme="theme-dark">Dark
            <button type="button" id="dark-change" class="animated-gradient theme-dark">Change</button>
        </div>
        <div class="theme-option theme-sunset" data-theme="theme-sunset">Sunset
            <button type="button" id="sunset-change" class="animated-gradient theme-sunset">Change</button>
        </div>
        <div class="theme-option theme-neon" data-theme="theme-neon">Neon
            <button type="button" id="neon-change" class="animated-gradient theme-neon">Change</button>
        </div>
        <div class="theme-option theme-classic" data-theme="theme-classic">Classic
            <button type="button" id="classic-change" class="animated-gradient theme-classic">Change</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="./script.js"></script>


</body>
</html>
